# Production compose for the Lightsail box.
# Runs MySQL + the Spring Boot API (pulled from GHCR).
# Judge0 is assumed to already be running on the host at :2358.
#
# Usage on the box:
#   export IMAGE=ghcr.io/sjh1108/oj-api      # set by the CD workflow
#   docker compose -f docker-compose.prod.yml --env-file .env pull
#   docker compose -f docker-compose.prod.yml --env-file .env up -d

services:
  mysql:
    image: mysql:8.0
    container_name: algoj-mysql
    restart: unless-stopped
    ports:
      # localhost-only bind: host port 3306 reachable only from same box
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - ./mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=128M
      - --max-connections=50
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ${IMAGE:-ghcr.io/sjh1108/oj-api}:latest
    container_name: algoj-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      # localhost-only: nginx on the host reverse-proxies to this.
      - "127.0.0.1:8080:8080"
    env_file: .env
    environment:
      # Overrides for the container network (the .env values target the host).
      # Reach MySQL via the compose service name instead of 127.0.0.1.
      DB_HOST: mysql
      DB_PORT: "3306"
      # Judge0 runs on the host, not in this compose project.
      JUDGE0_URL: http://host.docker.internal:2358
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
