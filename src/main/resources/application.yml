spring:
  application:
    name: oj
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    # Flyway owns the schema (db/migration); Hibernate only checks it matches.
    hibernate:
      ddl-auto: validate

  flyway:
    # Pre-Flyway databases (prod/dev with existing tables) get stamped as
    # already at V1 on first boot; only empty databases actually run V1.
    baseline-on-migrate: true
    baseline-version: 1

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        # Judge0 shares the box — keep judge parallelism modest.
        concurrency: ${JUDGE_WORKER_CONCURRENCY:2}
        max-concurrency: ${JUDGE_WORKER_MAX_CONCURRENCY:4}
        # One unacked message per worker so a second API container (blue-green
        # overlap) can pick up queued work immediately.
        prefetch: 1
        # Rejected messages go to the DLQ (see RabbitConfig), never back on the queue.
        default-requeue-rejected: false

  # Let in-flight requests finish before the JVM exits (blue-green drain).
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

judge0:
  url: ${JUDGE0_URL}
  connect-timeout-ms: 3000
  # Generous: generation runs two sequential wait=true executions (generator +
  # solution) of up to generate.time-limit-ms CPU each, plus queue wait.
  read-timeout-ms: 30000
  generate:
    # Generous limits for generator / model-solution runs (kept under read-timeout-ms).
    time-limit-ms: ${JUDGE0_GENERATE_TIME_LIMIT_MS:10000}
    memory-limit-kb: ${JUDGE0_GENERATE_MEMORY_LIMIT_KB:512000}
    # Judge0 fsize for generator/solution stdout. Values above 4096 also need
    # MAX_MAX_FILE_SIZE raised on the Judge0 deployment itself.
    max-file-size-kb: ${JUDGE0_GENERATE_MAX_FILE_SIZE_KB:4096}
  judge:
    # fsize for contestant runs — outputs for generated test data can be multi-MB.
    max-file-size-kb: ${JUDGE0_JUDGE_MAX_FILE_SIZE_KB:4096}

jwt:
  secret: ${JWT_SECRET}
  access-token-validity: ${JWT_ACCESS_TTL_MS:3600000}
  refresh-token-validity: ${JWT_REFRESH_TTL_MS:604800000}

algoj:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  seed-admin: ${ALGOJ_SEED_ADMIN:false}

bot:
  # Shared secret the Discord bot sends in X-Bot-Api-Key for /api/internal/**.
  api-key: ${BOT_API_KEY:}

discord:
  link-code-ttl-seconds: ${DISCORD_LINK_CODE_TTL_SECONDS:600}

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    # Schema changes go through Flyway migrations now (no more ddl-auto: update).
    properties:
      hibernate:
        format_sql: true
        show_sql: true

algoj:
  seed-admin: ${ALGOJ_SEED_ADMIN:true}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    dev.algoj: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: INFO
    dev.algoj: INFO
