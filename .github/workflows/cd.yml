name: CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/oj-api
  BOT_IMAGE: ghcr.io/${{ github.repository_owner }}/oj-bot

jobs:
  # ── Re-run the backend test suite before shipping ──────────────
  test:
    name: Backend test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: algoj
          MYSQL_USER: algoj
          MYSQL_PASSWORD: algoj
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      rabbitmq:
        image: rabbitmq:4-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd="rabbitmq-diagnostics -q ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: 127.0.0.1
      RABBITMQ_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: algoj
      DB_USER: algoj
      DB_PASSWORD: algoj
      JWT_SECRET: ci-test-secret-that-is-at-least-32-characters-long-000000
      JUDGE0_URL: http://localhost:2358
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      ALGOJ_SEED_ADMIN: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew --no-daemon build

  # ── Build the image and push it to GHCR ────────────────────────
  build-and-push:
    name: Build & push image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ env.IMAGE }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & push the Discord bot image (independent of the API) ─
  build-and-push-bot:
    name: Build & push bot image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BOT_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./discord-bot
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to the server (gated by the DEPLOY_ENABLED variable) ─
  deploy:
    name: Deploy to server
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      # Discord announcement is OPT-IN per PR: only PRs whose body contains a
      # "## 공지" section get announced, and only that section's content is
      # posted — user-facing release notes, not the whole technical body.
      # Base64 so the multi-line text travels safely through env vars into SSH.
      - name: Collect merged PR info
        id: prinfo
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const pr = prs.find((p) => p.merged_at) ?? prs[0];
            if (!pr) {
              core.info("No PR associated with this commit — skipping announcement.");
              core.setOutput("announce_b64", "");
              return;
            }
            // Extract the "## 공지" section: everything until the next H2 (or EOF).
            const lines = (pr.body ?? "").replace(/\r\n/g, "\n").split("\n");
            const start = lines.findIndex((l) => /^##\s*공지\s*$/.test(l.trim()));
            if (start === -1) {
              core.info(`PR #${pr.number} has no "## 공지" section — not announcing.`);
              core.setOutput("announce_b64", "");
              return;
            }
            let end = lines.length;
            for (let i = start + 1; i < lines.length; i++) {
              if (/^##\s+/.test(lines[i])) { end = i; break; }
            }
            const notice = lines.slice(start + 1, end).join("\n").trim();
            if (!notice) {
              core.info(`PR #${pr.number} "## 공지" section is empty — not announcing.`);
              core.setOutput("announce_b64", "");
              return;
            }
            const payload = {
              number: pr.number,
              title: pr.title,
              body: notice,
              url: pr.html_url,
            };
            core.setOutput("announce_b64",
              Buffer.from(JSON.stringify(payload), "utf8").toString("base64"));

      - name: Copy compose + deploy script to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "deploy/docker-compose.prod.yml,deploy/deploy-api.sh"
          target: /opt/algoj/
          strip_components: 1

      - name: Blue-green deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ env.IMAGE }}
          GHCR_USER: ${{ github.actor }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          ANNOUNCE_B64: ${{ steps.prinfo.outputs.announce_b64 }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: IMAGE,GHCR_USER,GHCR_PAT,ANNOUNCE_B64
          script: |
            set -e
            cd /opt/algoj
            # Authenticate to GHCR (skip if the package is public).
            if [ -n "$GHCR_PAT" ]; then
              echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi
            # Ensure MySQL + RabbitMQ are up.
            docker compose -f docker-compose.prod.yml --env-file .env up -d
            # Swap the API behind nginx. NO_OVERLAP=1: stop the old container
            # before booting the new one — this ≈2GB box can't run two JVMs at
            # once without thrashing swap past the health window. Trades a short
            # downtime for a deploy that reliably completes (rolls back by
            # restarting the old container if the new one fails health).
            chmod +x deploy-api.sh
            NO_OVERLAP=1 IMAGE="${IMAGE}:latest" bash deploy-api.sh
            # Tell the Discord bot to announce the update (best-effort: an
            # absent/disabled bot must never fail the deploy).
            if [ -n "$ANNOUNCE_B64" ]; then
              echo "$ANNOUNCE_B64" | base64 -d | curl -m 10 -fsS -X POST \
                -H "Content-Type: application/json" \
                -H "X-Bot-Api-Key: $(grep '^BOT_API_KEY=' .env | cut -d= -f2-)" \
                --data-binary @- http://127.0.0.1:3910/announce \
                && echo "deploy announced to Discord" \
                || echo "announce skipped (bot not reachable)"
            else
              echo "announce skipped (PR has no '## 공지' section)"
            fi
