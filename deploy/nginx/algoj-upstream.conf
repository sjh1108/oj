# Active blue/green API port — REWRITTEN by deploy/deploy-api.sh on each deploy.
# Install once at /etc/nginx/conf.d/algoj-upstream.conf (files in conf.d are
# auto-included in the http{} block). The public TLS site block and the
# internal :8080 server (algoj-internal.conf) both proxy_pass to this upstream.
upstream algoj_api {
    server 127.0.0.1:8081;
}
