# Stable internal entrypoint on 127.0.0.1:8080.
#
# Blue-green moves the API between ports 8081/8082, but the Discord bot (host
# network) and any other on-box client expect a fixed address. This server
# keeps 127.0.0.1:8080 pointing at whichever color is currently active via the
# algoj_api upstream, so OJ_API_BASE_URL=http://127.0.0.1:8080 keeps working.
#
# Install once at /etc/nginx/conf.d/algoj-internal.conf. Not rewritten by deploys.
server {
    listen 127.0.0.1:8080;
    server_name _;

    location / {
        proxy_pass http://algoj_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
