spring:
  application:
    name: oj
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

judge0:
  url: ${JUDGE0_URL}
  connect-timeout-ms: 3000
  read-timeout-ms: 15000
  generate:
    # Generous limits for generator / model-solution runs (kept under read-timeout-ms).
    time-limit-ms: ${JUDGE0_GENERATE_TIME_LIMIT_MS:10000}
    memory-limit-kb: ${JUDGE0_GENERATE_MEMORY_LIMIT_KB:512000}

jwt:
  secret: ${JWT_SECRET}
  access-token-validity: ${JWT_ACCESS_TTL_MS:3600000}
  refresh-token-validity: ${JWT_REFRESH_TTL_MS:604800000}

algoj:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  seed-admin: ${ALGOJ_SEED_ADMIN:false}

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true

algoj:
  seed-admin: ${ALGOJ_SEED_ADMIN:true}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    dev.algoj: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: INFO
    dev.algoj: INFO
