# Production compose for the Lightsail box — MySQL only.
# The API is deployed blue-green by deploy/deploy-api.sh (two alternating
# containers behind nginx), so it is NOT a compose service here. Judge0 is
# assumed to already be running on the host at :2358.
#
# Usage on the box:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d   # MySQL
#   IMAGE=ghcr.io/sjh1108/oj-api:latest bash deploy-api.sh            # API (blue-green)
#
# The named network below is shared: deploy-api.sh attaches the API container to
# `algoj_default` so it can reach MySQL by its service name.

services:
  mysql:
    image: mysql:8.0
    container_name: algoj-mysql
    restart: unless-stopped
    ports:
      # localhost-only bind: host port 3306 reachable only from same box
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - ./mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=128M
      - --max-connections=50
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

# The API is managed by deploy/deploy-api.sh (blue-green), not a compose service.

networks:
  # Fixed name so deploy-api.sh can `docker run --network algoj_default` reliably,
  # regardless of the compose project name.
  default:
    name: algoj_default
