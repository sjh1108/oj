name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - master   # master pushes are handled by cd.yml (which builds/tests too)

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (test + build)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: algoj
          MYSQL_USER: algoj
          MYSQL_PASSWORD: algoj
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    # The @SpringBootTest context load needs these placeholders resolved.
    env:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: algoj
      DB_USER: algoj
      DB_PASSWORD: algoj
      JWT_SECRET: ci-test-secret-that-is-at-least-32-characters-long-000000
      JUDGE0_URL: http://localhost:2358
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      ALGOJ_SEED_ADMIN: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & test
        run: ./gradlew --no-daemon build

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker-build:
    name: Docker image build (verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: algoj-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
