# Production compose for the Lightsail box — RabbitMQ.
# MySQL moved to AWS RDS (external, reached via DB_HOST in .env), so it is no
# longer a compose service here. The API is deployed blue-green by
# deploy/deploy-api.sh (two alternating containers behind nginx), also not a
# compose service. Judge0 is assumed to already be running on the host at :2358.
#
# Usage on the box:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d   # RabbitMQ
#   IMAGE=ghcr.io/sjh1108/oj-api:latest bash deploy-api.sh            # API (blue-green)
#
# The named network below is shared: deploy-api.sh attaches the API container to
# `algoj_default` so it can reach RabbitMQ by its service name.

services:
  rabbitmq:
    # Plain (non-management) alpine image: ~100MB RSS on the 2GB box.
    image: rabbitmq:4-alpine
    container_name: algoj-rabbitmq
    restart: unless-stopped
    # Hard cap. RabbitMQ 4 detects the cgroup limit and sets its memory high
    # watermark to 0.6 of THIS (≈230MB) instead of 0.6 of host RAM (~1.2GB), so
    # it back-pressures publishers well before hitting the limit — no OOM kill.
    mem_limit: 384m
    ports:
      # localhost-only bind, same policy as MySQL
      - "127.0.0.1:5672:5672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      # Durable queue data — queued judge jobs survive a broker restart.
      - ./rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

# The API is managed by deploy/deploy-api.sh (blue-green), not a compose service.

networks:
  # Fixed name so deploy-api.sh can `docker run --network algoj_default` reliably,
  # regardless of the compose project name.
  default:
    name: algoj_default
